name: FDA warning letters scraper

on:
  schedule:
    # Bi-weekly: 1st and 15th of each month at 09:00 UTC
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run FDA warning letters scraper
        id: scrape
        run: |
          npx tsx scripts/scrape-fda-warning-letters.ts --verbose
          # Capture how many new letters were added (parse from stdout)
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/fda-warning-letters.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Open PR with new letters
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: scraper/fda-letters-${{ github.run_number }}
          base: main
          title: "📮 New FDA warning letters discovered"
          body: |
            The bi-weekly FDA warning letters scraper found new letters and auto-enriched them with verbatim FDA content.

            **Editorial review checklist before merging:**
            - [ ] Open each new letter's `fda_url` and confirm it loads
            - [ ] Verify the extracted `subject` matches the FDA index column
            - [ ] Verify the `violations_summary` is a real verbatim FDA quote (not placeholder text)
            - [ ] Verify each new entry's `letter_excerpt` paragraphs are actual letter content (not navigation or footer text)
            - [ ] If any company in the new letters matches a provider in `src/data/providers.json`, set `matched_provider_slug` so the FdaWarningFlag surfaces on the review page
            - [ ] If the company is a manufacturer (e.g. Novo Nordisk) or pharmacy (not a telehealth provider), consider whether to keep or skip
            - [ ] Run `npm run build` locally to verify the JSON is valid

            Generated by `.github/workflows/scrape-fda-letters.yml`
          commit-message: "feat(fda-letters): auto-discovered new warning letters"
          delete-branch: true
